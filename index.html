<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Style Horizontal - Tambah Data Pelanggan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f2f5; 
            padding-top: 50px;
        }
        .form-card {
            max-width: 800px;
            margin: auto;
            border: none;
            border-top: 5px solid #198754;
        }
        .card-header {
            background-color: white;
            padding-top: 20px;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        @media (max-width: 767px) {
            .col-form-label {
                padding-bottom: 0;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-card shadow-lg">
        <div class="card-header text-center">
            <h3 class="fw-bold text-success">Tambah Data Pelanggan</h3>
            <p class="text-muted">Silakan isi formulir di bawah ini dengan lengkap.</p>
            <hr>
        </div>
        <div class="card-body p-4">
            
            <form>
                
                <div class="row mb-3">
                    <label for="noID" class="col-sm-3 col-form-label fw-semibold text-end">No. ID :</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="noID" placeholder="Masukkan Nomor ID" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="namaPelanggan" class="col-sm-3 col-form-label fw-semibold text-end">Nama Pelanggan :</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="namaPelanggan" placeholder="Masukkan Nama Lengkap" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="email" class="col-sm-3 col-form-label fw-semibold text-end">Email :</label>
                    <div class="col-sm-9">
                        <input type="email" class="form-control" id="email" placeholder="nama.anda@email.com">
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="tglLahir" class="col-sm-3 col-form-label fw-semibold text-end">Tgl Lahir :</label>
                    <div class="col-sm-4">
                        <input type="date" class="form-control" id="tglLahir">
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="alamat" class="col-sm-3 col-form-label fw-semibold text-end">Alamat :</label>
                    <div class="col-sm-9">
                        <textarea class="form-control" id="alamat" rows="4" placeholder="Alamat lengkap rumah atau kantor"></textarea>
                    </div>
                </div>

                <div class="row mt-5">
                    <div class="col-sm-9 offset-sm-3">
                        <button type="submit" class="btn btn-success px-5 py-2 fw-bold">
                            <i class="bi bi-save"></i> Simpan Pelanggan
                        </button>
                        <button type="reset" class="btn btn-outline-secondary px-4 py-2 ms-2">
                            Reset Form
                        </button>
                    </div>
                </div>

            </form>
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
